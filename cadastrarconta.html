<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="height:100vh; overflow:hidden;">
    <div class="cadastrarconta" style="margin-top: 20px;">

    <h1 class="titulo-cadastro">Criar conta</h1>

    <form class="form-cadastro">

        <div class="campo-cadastro">
            <label>Nome</label>
            <input type="text">
        </div>

        <div class="campo-cadastro">
            <label>Email</label>
            <input type="email">
        </div>

        <div class="campo-cadastro">
            <label>Senha</label>
            <input type="password">
        </div>

        <div class="campo-cadastro">
            <label>Confirmar senha</label>
            <input type="password">
        </div>

        <button class="btn-cadastro">Criar conta</button>

        <p class="texto-login">
            Já possui conta? <a href="login.html">Entrar</a>
        </p>

    </form>

</div>
</body>
</html>
