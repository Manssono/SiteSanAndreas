<!DOCTYPE html>
<html lang="pt">

<head>
<meta charset="UTF-8">
<title>Login - Southern San Andreas Super Autos</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

</head>

<body style="height:100vh; overflow:hidden;">

<div class="login-container">

    <h1 class="titulo-login">Login</h1>

    <form class="form-login" id="formLogin">

        <div class="campo-login">
            <label>Email</label>
            <input type="email" id="emailLogin" placeholder="Digite seu email" required>
        </div>

        <div class="campo-login">
            <label>Senha</label>
            <input type="password" id="senhaLogin" placeholder="Digite sua senha" required>
        </div>

        <button type="submit" class="btn-login">Entrar</button>

        <p class="texto-cadastro">
            Não possui conta? 
            <a href="cadastrarconta.html">Criar conta</a>
        </p>

    </form>

</div>

<script>
document.getElementById("formLogin").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = document.getElementById("emailLogin").value.trim();
    const senha = document.getElementById("senhaLogin").value;

    try {
        const resposta = await fetch("http://localhost:3000/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ email, senha })
        });

        const dados = await resposta.json();

        if (resposta.ok) {
            alert("Login realizado com sucesso!");

            // salva usuário logado
            localStorage.setItem("usuarioLogado", JSON.stringify(dados.usuario));

            // redireciona
            window.location.href = "index.html";

        } else {
            alert(dados.erro || "Erro ao fazer login");
        }

    } catch (err) {
        console.error("Erro:", err);
        alert("Não foi possível conectar ao servidor.");
    }
});
</script>

</body>
</html>
