<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carros - Southern San Andreas</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- HEADER -->
<div class="blocoheader">
    <a href="index.html" class="linkheader" style="margin-left: 100px;">Início</a>
    <p>|</p>
    <a href="carros.html" class="linkheader">Carros</a>
    <p>|</p>
    <a href="cadastro.html" class="linkheader">Anunciar</a>
    <p>|</p>
    <a href="login.html" id="linkUsuario" class="linkheader" style="margin-right: 100px;">Login</a>

    <div id="menuConta" class="dropdownConta" style="margin-right: 55px; margin-top: 5px;">
        <button id="btnLogout">Sair</button>
    </div>
</div>

<header>
    <div class="textoheader">
        <h1 class="logo" style="font-size: 90px;">Southern</h1>
        <h1 class="logo" style="color:yellow; font-size: 130px;">San Andreas</h1>
        <h1 class="logo" style="font-size: 90px;">Super Autos.com</h1>
        <p style="font-size: 30px; font-weight: bold; font-family:'Montserrat', sans-serif; text-shadow:5px 5px 5px rgba(0,0,0,0.5); color:white; position:relative; left:250px">
            MEETING YOUR VEHICULAR NEEDS
        </p>
    </div>
</header>

<div class="bloco_under_header" style="position:relative; top: 40px"></div>

<div class="bloco" style="position: sticky; top: 0; z-index: 10;">
    <p style="font-size: 35px; font-weight: bold;font-family:'Montserrat', sans-serif; color:black">
        Novidades Exclusivas
    </p>
    <a href="index.html" class="btn" style="font-size: 40px; position: relative; left: 284px; width:149px; height:50px;">Início</a>
    <a href="#filtro" class="btn_buscar">⌕</a>
</div>

<!-- CONTAINER DE CARROS -->
<div class="pagina-carros">
    <aside class="filtros">
        <h2>Filtros</h2>

        <label>Marca</label>
        <select id="filtroMarca">
            <option>Todos</option>
        </select>

        <!-- NOVO -->
        <label>Modelo</label>
        <select id="filtroModelo" disabled>
            <option>Todos</option>
        </select>

        <!-- NOVO -->
        <label>Motor</label>
        <select id="filtroMotor" disabled>
            <option>Todos</option>
        </select>

        <label>Ano</label>
        <input type="number" id="filtroAno" placeholder="A partir de">

        <label>Preço máximo</label>
        <input type="number" id="filtroPreco" placeholder="R$">

        <button class="btn-filtrar" id="btnFiltrar">Aplicar</button>
    </aside>

    <div class="container" id="containerCarros" style="position: relative; top:-50px">
        <!-- carros carregados via JS -->
    </div>
</div>

<script>
let listaCarros = [];

const usuario = JSON.parse(localStorage.getItem("usuarioLogado"));
const linkUsuario = document.getElementById("linkUsuario");
const menuConta = document.getElementById("menuConta");
const btnLogout = document.getElementById("btnLogout");

if(usuario){
    const primeiroNome = usuario.nome.split(" ")[0];
    linkUsuario.textContent = "Olá " + primeiroNome;
    linkUsuario.href = "#";
    linkUsuario.addEventListener("click", function(e){
        e.preventDefault();
        menuConta.classList.toggle("ativo");
    });
}

btnLogout.addEventListener("click", function(){
    localStorage.removeItem("usuarioLogado");
    window.location.href = "/frontend/login.html";
});

// HTML do carro
function criarCarroHTML(carro){
    return `
    <div class="blococarro" style="position: relative; top: 20px;">
        <img class="janela2" src="${carro.fotos && carro.fotos.length > 0 ? carro.fotos[0] : 'imagens/placeholder.png'}">
        <a href="carro.html?id=${carro.id}" class="card-link"></a>
        <div class="carro-info">
            <p class="carro-nome">${carro.marca} ${carro.modelo}</p>
            <div class="carro-linha">
                <p class="carro-detalhes">${carro.motor} ${carro.versao}<br>${carro.ano} | ${carro.quilometragem}km</p>
                <p class="carro-preco">R$${parseFloat(carro.preco).toLocaleString('pt-BR', {minimumFractionDigits:2})}</p>
            </div>
        </div>
    </div>`;
}

// carregar carros
async function carregarCarros(){
    try {
        const resposta = await fetch("http://localhost:3000/carros");
        listaCarros = await resposta.json();

        const container = document.getElementById("containerCarros");
        container.innerHTML = listaCarros.map(criarCarroHTML).join("");

        const selectMarca = document.getElementById("filtroMarca");
        const marcas = [...new Set(listaCarros.map(c => c.marca))];

        marcas.forEach(m => {
            const option = document.createElement("option");
            option.textContent = m;
            selectMarca.appendChild(option);
        });

    } catch(erro){
        console.error("Erro ao carregar carros:", erro);
    }
}

// filtros encadeados
const selectMarca = document.getElementById("filtroMarca");
const selectModelo = document.getElementById("filtroModelo");
const selectMotor = document.getElementById("filtroMotor");

selectMarca.addEventListener("change", () => {
    const marca = selectMarca.value;

    selectModelo.innerHTML = '<option>Todos</option>';
    selectMotor.innerHTML = '<option>Todos</option>';
    selectMotor.disabled = true;

    if (marca === "Todos") {
        selectModelo.disabled = true;
        return;
    }

    const modelos = [...new Set(
        listaCarros.filter(c => c.marca === marca).map(c => c.modelo)
    )];

    modelos.forEach(modelo => {
        const option = document.createElement("option");
        option.textContent = modelo;
        selectModelo.appendChild(option);
    });

    selectModelo.disabled = false;
});

selectModelo.addEventListener("change", () => {
    const marca = selectMarca.value;
    const modelo = selectModelo.value;

    selectMotor.innerHTML = '<option>Todos</option>';

    if (modelo === "Todos") {
        selectMotor.disabled = true;
        return;
    }

    const motores = [...new Set(
        listaCarros
            .filter(c => c.marca === marca && c.modelo === modelo)
            .map(c => c.motor)
    )];

    motores.forEach(motor => {
        const option = document.createElement("option");
        option.textContent = motor;
        selectMotor.appendChild(option);
    });

    selectMotor.disabled = false;
});

// aplicar filtro
document.getElementById("btnFiltrar").addEventListener("click", function(){
    const marca = selectMarca.value;
    const modelo = selectModelo.value;
    const motor = selectMotor.value;
    const ano = document.getElementById("filtroAno").value;
    const preco = document.getElementById("filtroPreco").value;

    let carros = [...listaCarros];

    if(marca !== "Todos") carros = carros.filter(c => c.marca === marca);
    if(modelo !== "Todos") carros = carros.filter(c => c.modelo === modelo);
    if(motor !== "Todos") carros = carros.filter(c => c.motor === motor);
    if(ano) carros = carros.filter(c => c.ano >= ano);
    if(preco) carros = carros.filter(c => parseFloat(c.preco) <= preco);

    const container = document.getElementById("containerCarros");
    container.innerHTML = carros.map(criarCarroHTML).join("");
});

carregarCarros();
</script>

</body>
</html>
