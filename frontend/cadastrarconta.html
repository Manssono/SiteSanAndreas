<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - Southern San Andreas</title>
    <link rel="stylesheet" href="style.css">
</head>

<body style="height:100vh; overflow:hidden;">
    <div class="cadastrarconta" style="margin-top: 20px;">
        <h1 class="titulo-cadastro">Criar conta</h1>

        <form class="form-cadastro" id="formCadastro">

            <div class="campo-cadastro">
                <label>Nome</label>
                <input type="text" id="nome" required>
            </div>

            <div class="campo-cadastro">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>

            <div class="campo-cadastro">
                <label>Senha</label>
                <input type="password" id="senha" required>
            </div>

            <div class="campo-cadastro">
                <label>Confirmar senha</label>
                <input type="password" id="confirmarSenha" required>
            </div>

            <button type="submit" class="btn-cadastro">Criar conta</button>
            <p class="texto-cadastro">
            Possui conta? 
            <a href="login.html">Fazer login</a>
        </p>
        </form>
    </div>

<script>
document.getElementById("formCadastro").addEventListener("submit", async function(e) {
    e.preventDefault();

    const nome = document.getElementById("nome").value.trim();
    const email = document.getElementById("email").value.trim();
    const senha = document.getElementById("senha").value;
    const confirmarSenha = document.getElementById("confirmarSenha").value;

    // Validação senha
    if (senha !== confirmarSenha) {
        alert("As senhas não coincidem!");
        return;
    }

    try {
        const resposta = await fetch("http://localhost:3000/cadastrar", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ nome, email, senha })
});

        const dados = await resposta.json();

        if (resposta.ok) {
            window.location.href = "/frontend/login.html";
} else {
    alert(dados.erro || "Ocorreu um erro ao cadastrar");
}

    } catch (erro) {
        console.error("Erro de conexão:", erro);
        alert("Não foi possível conectar ao servidor.");
    }
});
</script>

<div id="popupCadastro" class="popup">

    <div class="popup-conteudo">
        <h2>Conta criada!</h2>
        <p>Seu cadastro foi realizado com sucesso.</p>
        <button id="btnIrLogin">Ir para login</button>
    </div>

</div>
</body>
</html>
