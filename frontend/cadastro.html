<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anunciar Carro - Southern San Andreas</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

<style>
.preview-fotos {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 10px;
}

.preview-item {
    position: relative;
    cursor: grab;
    transition: transform 0.15s ease, opacity 0.15s ease;
}

.preview-item.dragging {
    opacity: 0.4;
    transform: scale(1.05);
}

.preview-item img {
    width: 120px;
    height: 90px;
    object-fit: cover;
    border-radius: 5px;
    border: 2px solid transparent;
}

.preview-item.capa img {
    border: 2px solid gold;
}

.preview-botoes {
    position: absolute;
    top: 2px;
    right: 2px;
    display: flex;
    flex-direction: column;
    gap: 2px;
}

.preview-botoes button {
    font-size: 11px;
    cursor: pointer;
    background: rgba(0,0,0,0.7);
    color: white;
    border: none;
    border-radius: 3px;
    padding: 2px 4px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="blocoheader">
    <a href="index.html" class="linkheader" style="margin-left: 100px;">Início</a>
    <p>|</p>
    <a href="carros.html" class="linkheader">Carros</a>
    <p>|</p>
    <a href="cadastro.html" class="linkheader">Anunciar</a>
    <p>|</p>
    <a href="login.html" id="linkUsuario" class="linkheader" style="margin-right: 100px;">Login</a>

    <div id="menuConta" class="dropdownConta" style="margin-right: 55px; margin-top: 5px;">
        <button id="btnLogout">Sair</button>
    </div>
</div>

<!-- Banner -->
<header>
    <div class="textoheader">
        <h1 class="logo" style="font-size: 90px;">Southern</h1>
        <h1 class="logo" style="color:yellow; font-size: 130px;">San Andreas</h1>
        <h1 class="logo" style="font-size: 90px;">Super Autos.com</h1>
        <p style="font-size: 30px; font-weight: bold; font-family:'Montserrat', sans-serif; text-shadow:5px 5px 5px rgba(0,0,0,0.5); color:white; position:relative; left:250px">
            MEETING YOUR VEHICULAR NEEDS
        </p>
    </div>
</header>

<div class="bloco_under_header" style="position:relative; top: 40px"></div>

<div class="bloco" style="position: sticky; top:0; z-index:10;">
    <p style="font-size:35px; font-weight:bold;font-family:'Montserrat',sans-serif;color:black">Anuncie seu Carro</p>
    <a href="index.html" class="btn" style="font-size:40px; position:relative; left:311.5px; width:149px; height:50px;">Início</a>
    <a href="#filtro" class="btn_buscar">⌕</a>
</div>

<script>
const usuarioLogado = JSON.parse(localStorage.getItem("usuarioLogado"));
if (!usuarioLogado) {
    alert("Você precisa estar logado para anunciar um carro.");
    window.location.href = "/frontend/login.html";
}
</script>

<div class="bloco-cadastro">
<h1 class="titulo-cadastro">Anunciar veículo</h1>

<form class="form-cadastro" id="formCarro">

<!-- ESPECIFICAÇÕES -->
<section class="secao-cadastro">
<h2 class="titulo-secao">Especificações</h2>
<div class="specs-cadastro">
<div class="campo"><label>Marca</label><input type="text" id="marca" required></div>
<div class="campo"><label>Modelo</label><input type="text" id="modelo" required></div>
<div class="campo"><label>Ano</label><input type="number" id="ano" required></div>
<div class="campo"><label>Quilometragem</label><input type="number" id="quilometragem" required></div>
<div class="campo"><label>Motor</label><input type="text" id="motor" required></div>
<div class="campo"><label>Versão</label><input type="text" id="versao" required></div>
<div class="campo"><label>Câmbio</label>
<select id="cambio">
<option>Manual</option>
<option>Automático</option>
</select>
</div>
<div class="campo"><label>Combustível</label>
<select id="combustivel">
<option>Flex</option>
<option>Gasolina</option>
<option>Diesel</option>
</select>
</div>
<div class="campo"><label>Preço (R$)</label><input type="number" id="preco" required></div>
</div>
</section>

<!-- DESCRIÇÃO -->
<section class="secao-cadastro">
<h2 class="titulo-secao">Descrição</h2>
<textarea id="descricao" class="descricao-input" required></textarea>
</section>

<!-- FOTOS (ALTERADO) -->
<section class="secao-cadastro">
<h2 class="titulo-secao">Fotos</h2>
<input type="file" id="fotosCarro" multiple accept="image/*">

<p style="font-size:12px; color:gray; margin-top:5px;">
Arraste para ordenar • ⭐ define capa
</p>

<div id="previewFotos" class="preview-fotos"></div>
</section>

<!-- CONTATO -->
<section class="secao-cadastro">
<h2 class="titulo-secao">Contato</h2>
<div class="specs-cadastro">
<div class="campo"><label>Nome</label><input type="text" id="contatoNome" required></div>
<div class="campo"><label>Telefone</label><input type="text" id="contatoTelefone" required></div>
<div class="campo"><label>Email</label><input type="email" id="contatoEmail" required></div>
<div class="campo"><label>Cidade</label><input type="text" id="contatoCidade" required></div>
</div>
</section>

<button type="submit" class="btn-publicar">Publicar anúncio</button>
</form>
</div>

<div class="bloco_under_header" style="margin-top:20px;"></div>

<!-- SCRIPT -->
<script>
let fotosOrdenadas = [];
let draggedIndex = null;

// upload
document.getElementById("fotosCarro").addEventListener("change", async function(e){
    for (let file of e.target.files) {
        const base64 = await new Promise((res, rej)=>{
            const r = new FileReader();
            r.onload = () => res(r.result);
            r.onerror = rej;
            r.readAsDataURL(file);
        });
        fotosOrdenadas.push(base64);
    }
    e.target.value = "";
    renderizarPreview();
});

// render
function renderizarPreview(){
    const container = document.getElementById("previewFotos");
    container.innerHTML = "";

    fotosOrdenadas.forEach((foto, index)=>{

        const div = document.createElement("div");
        div.className = "preview-item" + (index === 0 ? " capa" : "");
        div.draggable = true;

        const img = document.createElement("img");
        img.src = foto;

        const box = document.createElement("div");
        box.className = "preview-botoes";

        // remover
        const del = document.createElement("button");
        del.textContent = "X";
        del.onclick = ()=>{
            fotosOrdenadas.splice(index,1);
            renderizarPreview();
        };

        // definir capa
        const star = document.createElement("button");
        star.textContent = "⭐";
        star.onclick = ()=>{
            const item = fotosOrdenadas.splice(index,1)[0];
            fotosOrdenadas.unshift(item);
            renderizarPreview();
        };

        box.appendChild(star);
        box.appendChild(del);

        // drag
        div.addEventListener("dragstart", ()=>{
            draggedIndex = index;
            div.classList.add("dragging");
        });

        div.addEventListener("dragend", ()=>{
            div.classList.remove("dragging");
        });

        div.addEventListener("dragover", e => e.preventDefault());

        div.addEventListener("drop", ()=>{
            const item = fotosOrdenadas.splice(draggedIndex,1)[0];
            fotosOrdenadas.splice(index,0,item);
            renderizarPreview();
        });

        div.appendChild(img);
        div.appendChild(box);
        container.appendChild(div);
    });
}

// SUBMIT (inalterado, só troca fotos)
document.getElementById("formCarro").addEventListener("submit", async function(e){
    e.preventDefault();

    const carro = {
        marca: marca.value.toUpperCase(),
        modelo: modelo.value.toUpperCase(),
        ano: ano.value,
        quilometragem: quilometragem.value,
        motor: motor.value.toUpperCase(),
        versao: versao.value.toUpperCase(),
        cambio: cambio.value.toUpperCase(),
        combustivel: combustivel.value.toUpperCase(),
        preco: preco.value,
        descricao: descricao.value,
        contatoNome: contatoNome.value.toUpperCase(),
        contatoTelefone: contatoTelefone.value,
        contatoEmail: contatoEmail.value,
        contatoCidade: contatoCidade.value.toUpperCase(),
        anunciante: usuarioLogado.nome,
        fotos: fotosOrdenadas
    };

    const res = await fetch("http://localhost:3000/carros",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify(carro)
    });

    if(res.ok){
        alert("Carro cadastrado com sucesso!");
        window.location.href = "carros.html";
    } else {
        alert("Erro ao anunciar o carro");
    }
});
</script>

</body>
</html>
